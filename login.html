<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Game Mania</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="card bg-dark text-white border-secondary p-4 shadow-lg login-card" style="max-width: 400px; width: 100%;">
            <div class="text-center mb-4">
                <a href="index.html" class="text-danger fw-bold fs-2 text-decoration-none">GAME MANIA</a>
                <p class="text-secondary small">Entre na sua conta gamer</p>
            </div>
            <form id="loginForm">
                <div class="mb-3">
                    <label for="email" class="form-label">E-mail</label>
                    <input type="email" class="form-control bg-dark text-white border-secondary" id="email" placeholder="seu@email.com" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Senha</label>
                    <input type="password" class="form-control bg-dark text-white border-secondary" id="password" placeholder="Sua senha" required>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="remember">
                    <label class="form-check-label small" for="remember">Lembrar de mim</label>
                </div>
                <button type="submit" class="btn btn-danger w-100 fw-bold py-2">ENTRAR</button>
                <div class="text-center mt-3">
                    <a href="#" class="text-secondary small text-decoration-none">Esqueceu a senha?</a>
                </div>
                <hr class="border-secondary my-4">
                <div class="text-center">
                    <p class="small mb-0">Não tem uma conta? <a href="#" class="text-danger text-decoration-none">Cadastre-se</a></p>
                </div>
            </form>
            <div id="loginMessage" class="mt-3 text-center d-none"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
